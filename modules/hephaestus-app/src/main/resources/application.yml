server:
  port: ${SERVER_PORT:11018}
  servlet:
    context-path: /${CONTEXT_PATH:hephaestus}
  tomcat:
    uri-encoding: utf-8
    accesslog:
      enabled: true
      pattern: '%h %S %t "%r" %s %b %D'
      max-days: 30
    basedir: ${logging.file.path}/tomcat_logs
    threads:
      max: ${TOMCAT_THREAD_MAX:800}
      min-spare: ${TOMCAT_MIN_SPARE:100}
    accept-count: ${TOMCAT_ACCEPT_COUNT:1000}
    max-connections: ${TOMCAT_MAX_CONNECTIONS:10000}
  aas:
    accesslog:
      enabled: true
      pattern: '%h %S %t "%r" %s %b %D'
      max-days: 30
    basedir: ${logging.file.path}/aas
    max-threads: ${TOMCAT_THREADS_MAX:512}
    max-connections: ${TOMCAT_MAX_CONNECTIONS:8192}
    accept-count: ${TOMCAT_ACCEPT_COUNT:1000}

